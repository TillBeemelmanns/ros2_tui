name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  RUSTUP_MAX_RETRIES: 10

jobs:
  prepare:
    name: Prepare metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Extract version from tag
        id: extract
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$VERSION" ]; then
            echo "Tag must follow vX.Y.Z"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build_binaries:
    name: Build release binaries
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: ros2_tui-x86_64-unknown-linux-gnu.tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: ros2_tui-x86_64-unknown-linux-musl.tar.gz
          - target: i686-unknown-linux-musl
            os: ubuntu-latest
            archive: ros2_tui-i686-unknown-linux-musl.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: ros2_tui-aarch64-unknown-linux-gnu.tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: ros2_tui-aarch64-unknown-linux-musl.tar.gz
          - target: arm-unknown-linux-musleabihf
            os: ubuntu-latest
            archive: ros2_tui-arm-unknown-linux-musleabihf.tar.gz
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
      - name: Build
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --release --locked --target ${{ matrix.target }}
          use-cross: ${{ matrix.os == 'ubuntu-latest' }}
      - name: Package binaries
        run: |
          cd target/${{ matrix.target }}/release
          cp topics ros2-topics
          cp params ros2-params
          tar czvf ../../../${{ matrix.archive }} ros2-topics ros2-params
          cd -
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release_assets:
    name: Create GitHub release
    needs: build_binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ros2_tui-*.tar.gz
          merge-multiple: true
      - name: Collect artifacts
        run: |
          shopt -s globstar
          mkdir out
          for file in **/*.tar.gz; do
            base=$(basename "$file")
            cp "$file" "out/$base"
            (cd out && sha256sum "$base" > "$base.sha256")
          done
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            out/*.tar.gz
            out/*.tar.gz.sha256

  maturin_linux:
    name: Build PyPI wheels (manylinux)
    needs: prepare
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
          - runner: ubuntu-latest
            target: x86
          - runner: ubuntu-latest
            target: aarch64
          - runner: ubuntu-latest
            target: armv7
          - runner: ubuntu-latest
            target: s390x
          - runner: ubuntu-latest
            target: ppc64le
    steps:
      - uses: actions/checkout@v4
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: 'true'
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

  maturin_musllinux:
    name: Build PyPI wheels (musllinux)
    needs: prepare
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
          - runner: ubuntu-latest
            target: x86
          - runner: ubuntu-latest
            target: aarch64
          - runner: ubuntu-latest
            target: armv7
    steps:
      - uses: actions/checkout@v4
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: 'true'
          manylinux: musllinux_1_2
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: dist

  publish_pypi:
    name: Publish to PyPI
    needs: [maturin_linux, maturin_musllinux]
    runs-on: ubuntu-latest
    env:
      MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
      - name: Collect wheels
        run: |
          mkdir dist
          find . -name '*.whl' -exec mv {} dist/ \;
      - name: Upload to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*

  publish_crates:
    name: Publish to crates.io
    needs: [release_assets, publish_pypi]
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Publish crate
        run: cargo publish --locked
